name: Trigger auto deployment for ca-expressedrealms-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-expressedrealms-api-AutoDeployTrigger-e1faf9c6-becc-464f-8dc4-d853e5cdfe72.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAEXPRESSEDREALMSAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAEXPRESSEDREALMSAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAEXPRESSEDREALMSAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: expressedrealms.azurecr.io
          registryUsername: ${{ secrets.CAEXPRESSEDREALMSAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAEXPRESSEDREALMSAPI_REGISTRY_PASSWORD }}
          containerAppName: ca-expressedrealms-api
          resourceGroup: RG_ExpressedRealms
          imageToBuild: expressedrealms.azurecr.io/ca-expressedrealms-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


